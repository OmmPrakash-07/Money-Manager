<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Money Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">

        <!-- Theme Switcher -->
        <div class="theme-toggle">
            <label class="switch">
                <input type="checkbox" id="themeSwitcher">
                <span class="slider"></span>
            </label>
        </div>

        <h2>Money Manager 💰</h2>

        <!-- Expense Entry Section -->
        <div class="expense-entry">
            <input type="number" id="spendMoney" placeholder="Enter Spend Amount">
            <input type="text" id="description" placeholder="Enter Description (e.g., Food)">
            <!-- CATEGORY DROPDOWN (NEW) -->
            <select id="categorySelect">
                <option value="">Select Category</option>
                <option value="🍔 Food">🍔 Food</option>
                <option value="🚗 Transport">🚗 Transport</option>
                <option value="🏠 Housing">🏠 Housing</option>
                <option value="🎬 Entertainment">🎬 Entertainment</option>
                <option value="🛒 Shopping">🛒 Shopping</option>
                <option value="💊 Health">💊 Health</option>
                <option value="📚 Education">📚 Education</option>
                <option value="⚡ Utilities">⚡ Utilities</option>
                <option value="✈️ Travel">✈️ Travel</option>
                <option value="🎁 Gifts">🎁 Gifts</option>
                <option value="💼 Work">💼 Work</option>
                <option value="📦 Other">📦 Other</option>
            </select>
            <button id="addBtn">Add Expense</button>
        </div>

        <!-- Category Filter (NEW) -->
        <div class="category-filter">
            <span>Filter:</span>
            <button class="filter-btn active" data-category="all">All</button>
            <button class="filter-btn" data-category="🍔 Food">🍔</button>
            <button class="filter-btn" data-category="🚗 Transport">🚗</button>
            <button class="filter-btn" data-category="🏠 Housing">🏠</button>
            <button class="filter-btn" data-category="🎬 Entertainment">🎬</button>
            <button class="filter-btn" data-category="🛒 Shopping">🛒</button>
            <button class="filter-btn" data-category="💊 Health">💊</button>
            <button class="filter-btn" data-category="📚 Education">📚</button>
            <button class="filter-btn" data-category="⚡ Utilities">⚡</button>
            <button class="filter-btn" data-category="✈️ Travel">✈️</button>
            <button class="filter-btn" data-category="🎁 Gifts">🎁</button>
            <button class="filter-btn" data-category="💼 Work">💼</button>
            <button class="filter-btn" data-category="📦 Other">📦</button>
        </div>

        <!-- Dashboard Stats Cards -->
        <div class="stats">
            <div class="stat-card stat-total">
                <div class="stat-label">Total Money</div>
                <div class="stat-value" id="totalMoneyText">₹0</div>
            </div>
            <div class="stat-card stat-remaining">
                <div class="stat-label">Remaining</div>
                <div class="stat-value" id="resultText">₹0</div>
            </div>
            <div class="stat-card stat-spent">
                <div class="stat-label">Total Spent</div>
                <div class="stat-value" id="totalSpentText">₹0</div>
            </div>
        </div>

        <!-- Search Filter -->
        <input type="text" id="searchInput" placeholder="Search by Description...">

        <!-- Expense History Table -->
        <div id="exportContent">

            <h3>Expense History 📋</h3>

            <!-- ✅ Wrapper for mobile scroll -->
            <div class="table-container">
                <div class="table-wrapper">
                    <table id="expenseTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th class="pdf-hide">Date & Time</th>
                                <th>Description</th>
                                <th>Category</th>
                                <th>Spent</th>
                                <th>Remaining</th>
                                <th class="pdf-hide no-print">Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

        </div>

        <!-- Buttons Group -->
        <div class="button-group">
            <button id="exportPdfBtn">Export PDF</button>
            <button id="resetBtn">Reset</button>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- Floating Add Money Button -->
    <button id="addMoneyIcon" class="fab">+</button>

    <!-- Add Money Modal -->
    <div id="addMoneyModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3>Add More Money</h3>
            <input type="number" id="modalAddMoneyInput" placeholder="Enter Amount">
            <button id="modalAddMoneyBtn">Add Money</button>
        </div>
    </div>

    <!-- Edit Expense Modal -->
    <div id="editExpenseModal" class="modal">
        <div class="modal-content">
            <span class="edit-close-btn">&times;</span>
            <h3>Edit Expense</h3>
            <input type="text" id="editDescriptionInput" placeholder="Edit Description">
            <input type="number" id="editSpentInput" placeholder="Edit Spend Amount">
            <!-- CATEGORY EDIT DROPDOWN (NEW) -->
            <select id="editCategorySelect">
                <option value="">Select Category</option>
                <option value="🍔 Food">🍔 Food</option>
                <option value="🚗 Transport">🚗 Transport</option>
                <option value="🏠 Housing">🏠 Housing</option>
                <option value="🎬 Entertainment">🎬 Entertainment</option>
                <option value="🛒 Shopping">🛒 Shopping</option>
                <option value="💊 Health">💊 Health</option>
                <option value="📚 Education">📚 Education</option>
                <option value="⚡ Utilities">⚡ Utilities</option>
                <option value="✈️ Travel">✈️ Travel</option>
                <option value="🎁 Gifts">🎁 Gifts</option>
                <option value="💼 Work">💼 Work</option>
                <option value="📦 Other">📦 Other</option>
            </select>
            <button id="saveEditBtn">Save Changes</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="html2pdf.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
